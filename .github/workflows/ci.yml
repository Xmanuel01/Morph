name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        uses: rhysd/actionlint@v1

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check --all
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: |
          cargo build -p enkai_native
          cargo test --workspace
      - name: Docs contract consistency
        run: python3 scripts/check_docs_consistency.py
      - name: Frontend/Serve contract snapshots
        run: cargo test -p enkai --bin enkai frontend::tests::contract_snapshots_match_reference_files

  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build benchmark binary
        run: cargo build -p enkai
      - name: Build native benchmark dependency
        run: cargo build -p enkai_native
      - name: Run official benchmark suite (single-iteration smoke)
        run: |
          cargo run -p enkai -- bench run \
            --suite official_v2_1_0 \
            --baseline python \
            --iterations 1 \
            --warmup 0 \
            --machine-profile bench/machines/linux_ref.json \
            --output bench/results/ci_official_v2_1_0.json \
            --enkai-bin target/debug/enkai
      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-official-smoke
          path: bench/results/ci_official_v2_1_0.json
          if-no-files-found: error

  release-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run release pipeline (package gate handled by matrix package-check job)
        env:
          SKIP_PACKAGE_CHECK: "1"
        run: sh scripts/release_pipeline.sh

  rc-pipeline-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run RC pipeline dry-run (no mandatory GPU evidence)
        env:
          ALLOW_MISSING_GPU_EVIDENCE: "1"
          SKIP_PACKAGE_CHECK: "1"
        run: sh scripts/rc_pipeline.sh
      - name: Upload RC dry-run evidence
        uses: actions/upload-artifact@v4
        with:
          name: rc-dry-run-evidence
          path: artifacts/release/**
          if-no-files-found: error

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: RustSec advisory audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: License metadata audit
        run: python3 scripts/license_audit.py

  bootstrap-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build native runtime module
        run: cargo build -p enkai_native
      - name: Bootstrap parity tests
        run: cargo test -p enkai --bin enkai bootstrap::tests::
  selfhost-mainline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build native runtime module
        run: cargo build -p enkai_native
      - name: Run self-host mainline lane (Enkai-built compiler default)
        run: |
          mkdir -p artifacts/selfhost
          cargo run -p enkai -- litec mainline-ci enkai/tools/bootstrap/selfhost_corpus --triage-dir artifacts/selfhost
      - name: Upload self-host mainline triage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: selfhost-mainline-triage
          path: artifacts/selfhost/*.json
          if-no-files-found: error

  selfhost-stage0-fallback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build native runtime module
        run: cargo build -p enkai_native
      - name: Run self-host fallback lane (Stage0 comparison required)
        run: |
          cargo test -p enkai --bin enkai bootstrap::tests::litec_selfhost_
          cargo run -p enkai -- litec selfhost-ci enkai/tools/bootstrap/selfhost_corpus

  package-check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_os: linux
            arch: x86_64
            bin_path: target/release/enkai
            native_path: target/release/libenkai_native.so
            archive_ext: tar.gz
          - os: windows-latest
            target_os: windows
            arch: x86_64
            bin_path: target/release/enkai.exe
            native_path: target/release/enkai_native.dll
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: |
          cargo build -p enkai --release
          cargo build -p enkai_native --release
      - name: Deterministic package + checksum + smoke (Linux)
        if: matrix.target_os == 'linux'
        shell: bash
        run: |
          VERSION="$(python3 scripts/current_version.py)"
          python3 scripts/package_release.py \
            --version "$VERSION" \
            --target-os "${{ matrix.target_os }}" \
            --arch "${{ matrix.arch }}" \
            --bin "${{ matrix.bin_path }}" \
            --native "${{ matrix.native_path }}" \
            --check-deterministic
          ARCHIVE="dist/enkai-${VERSION}-${{ matrix.target_os }}-${{ matrix.arch }}.${{ matrix.archive_ext }}"
          python3 scripts/verify_release_artifact.py \
            --archive "$ARCHIVE" \
            --target-os "${{ matrix.target_os }}" \
            --smoke
          python3 scripts/generate_sbom.py --output "dist/sbom-${VERSION}-${{ matrix.target_os }}-${{ matrix.arch }}.json"
      - name: Deterministic package + checksum + smoke (Windows)
        if: matrix.target_os == 'windows'
        shell: pwsh
        run: |
          $version = python scripts/current_version.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $version = $version.Trim()
          python scripts/package_release.py `
            --version $version `
            --target-os "${{ matrix.target_os }}" `
            --arch "${{ matrix.arch }}" `
            --bin "${{ matrix.bin_path }}" `
            --native "${{ matrix.native_path }}" `
            --check-deterministic
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $archive = "dist/enkai-$version-${{ matrix.target_os }}-${{ matrix.arch }}.${{ matrix.archive_ext }}"
          python scripts/verify_release_artifact.py `
            --archive $archive `
            --target-os "${{ matrix.target_os }}" `
            --smoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python scripts/generate_sbom.py --output "dist/sbom-$version-${{ matrix.target_os }}-${{ matrix.arch }}.json"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Upload package-check artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-check-${{ matrix.target_os }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  torch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyTorch CPU
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.2.0+cpu --index-url https://download.pytorch.org/whl/cpu
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test enkai_tensor with torch
        env:
          LIBTORCH_USE_PYTORCH: "1"
          PYTHON_SYS_EXECUTABLE: python
        run: |
          TORCH_LIB_DIR=$(python -c "import os, torch; print(os.path.join(os.path.dirname(torch.__file__), 'lib'))")
          export LD_LIBRARY_PATH="$TORCH_LIB_DIR:${LD_LIBRARY_PATH:-}"
          cargo test -p enkai_tensor --features torch --tests retain_counts --tests leak_check --tests backend_api --tests amp_handles --tests checkpoint_ranked

  torch-gpu:
    # Requires a self-hosted runner with CUDA + NCCL + GPU drivers installed.
    runs-on: [self-hosted, linux, gpu]
    env:
      LIBTORCH_USE_PYTORCH: "1"
      PYTHON_SYS_EXECUTABLE: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyTorch CUDA
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.2.0+cu121 --index-url https://download.pytorch.org/whl/cu121
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run GPU/NCCL tests
        run: |
          TORCH_LIB_DIR=$(python -c "import os, torch; print(os.path.join(os.path.dirname(torch.__file__), 'lib'))")
          export LD_LIBRARY_PATH="$TORCH_LIB_DIR:${LD_LIBRARY_PATH:-}"
          cargo test -p enkai_tensor --features "torch,dist" --tests backend_api --tests backend_cpu_ops --tests backend_rank_device --tests leak_check --tests retain_counts --tests amp_handles --tests checkpoint_ranked

  tensor-no-torch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check enkai_tensor without torch
        run: cargo check -p enkai_tensor --no-default-features

  docker:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: vars
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          TAGS="$IMAGE:sha-${{ github.sha }}"
          if [ "${{ github.ref_type }}" = "branch" ] && [ "${{ github.ref_name }}" = "main" ]; then
            TAGS="$TAGS,$IMAGE:latest"
          fi
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAGS="$TAGS,$IMAGE:${{ github.ref_name }}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.tags }}
